<!DOCTYPE html>
<html>
<head>
 <title>Nested Lists</title>
</head>
<body>
 <h3>Ordered List within Unordered List</h3>
 <ul>
 <li>Fruits
 <ol>
 <li>Apple</li>
 <li>Banana</li>
 <li>Mango</li>
 </ol>
 </li>
 <li>Vegetables</li>
 </ul>
 <h3>Unordered List within Ordered List</h3>
<ol>
 <li>Subjects
 <ul>
 <li>Maths</li>
 <li>Science</li>
 <li>Computer</li>
 </ul>
 </li>
 <li>Sports</li>
 </ol>
</body>
</html>
